name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "capacitor.config.ts"
      - "resources/**"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Create web assets directory
        run: mkdir -p out && echo "<html><body></body></html>" > out/index.html

      - name: Add Android platform
        run: npx cap add android

      - name: Copy icon and splash assets
        run: |
          if [ -f resources/icon.png ]; then
            npx @capacitor/assets generate --android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk GameProgress.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameProgress-debug
          path: GameProgress.apk
          retention-days: 30

      - name: Create/Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: GameProgress APK
          body: |
            Dernière version de GameProgress pour Android.
            Télécharge le fichier **GameProgress.apk** et installe-le sur ton téléphone.
          files: GameProgress.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
